name: CI/CD Pipeline

on:
  push:
    branches: ["**"]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}

      - name: Configure DB connection
        env:
          SECRET_ARN: arn:aws:secretsmanager:eu-central-1:398934906881:secret:rds!db-29f7088c-beed-4e24-915a-e8697ee55950-Vlstkh
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_ARN" \
            --query SecretString --output text)
          DB_USER=$(echo "$SECRET" | jq -r .username)
          DB_PASSWORD=$(echo "$SECRET" | jq -r .password)
          echo "::add-mask::$DB_PASSWORD"
          kubectl create configmap demo-app-config \
            --from-literal=DB_HOST=${{ vars.DB_HOST }} \
            --from-literal=DB_PORT=${{ vars.DB_PORT }} \
            --from-literal=DB_NAME=${{ vars.DB_NAME }} \
            --from-literal=DB_USER="$DB_USER" \
            --namespace=demo-app-cicd \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic demo-app-secret \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --namespace=demo-app-cicd \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          git clone --depth=1 https://github.com/t-foerst/demo-kubernetes.git infra
          kubectl apply -k infra/app/overlays/cicd

      - name: Roll out new image
        run: kubectl set image deployment/demo-app demo-app=${{ env.IMAGE }}:${{ github.sha }} -n demo-app-cicd

      - name: Wait for rollout
        run: kubectl rollout status deployment/demo-app -n demo-app-cicd --timeout=120s
