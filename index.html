<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Demo App</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: system-ui, sans-serif;
                background: #0f172a;
                color: #e2e8f0;
                min-height: 100vh;
                display: grid;
                place-items: center;
            }

            .card {
                border: 1px solid #334155;
                border-radius: 12px;
                padding: 2.5rem 3rem;
                text-align: center;
                max-width: 420px;
                width: 90%;
            }

            h1 {
                font-size: 2rem;
                font-weight: 700;
                letter-spacing: -0.03em;
                margin-bottom: 0.5rem;
            }

            p {
                color: #94a3b8;
                line-height: 1.6;
                margin-top: 0.75rem;
            }

            .badge {
                display: inline-block;
                margin-top: 1.5rem;
                padding: 0.3rem 0.8rem;
                background: #1e293b;
                border: 1px solid #475569;
                border-radius: 999px;
                font-size: 0.75rem;
                color: #7dd3fc;
                letter-spacing: 0.05em;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Demo App</h1>
            <p>Statische Demo-Website, containerisiert mit Docker.</p>
            <span class="badge">served by nginx</span>
        </div>
    </body>
</html>
